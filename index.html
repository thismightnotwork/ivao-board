<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IVAO Flight Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: left;
      margin: 0 0 10px;
      font-size: 26px;
      color: #ffd800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      border: 2px solid #ffd800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #airportInputContainer {
      margin-bottom: 10px;
      font-size: 14px;
      color: #ccc;
    }

    #airportInput {
      padding: 4px 8px;
      font-size: 14px;
      width: 90px;
      text-transform: uppercase;
      border-radius: 3px;
      border: 1px solid #666;
      outline: none;
      color: #000;
    }

    #updateBtn {
      padding: 4px 10px;
      font-size: 14px;
      margin-left: 6px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      background: #333;
      color: #fff;
    }

    #updateBtn:hover {
      background: #555;
    }

    .board-container {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
    }

    .board-column {
      flex: 1;
      background: #000;
      border: 1px solid #333;
    }

    .board-header {
      background: #111;
      color: #ffd800;
      padding: 6px 10px;
      font-size: 18px;
      text-transform: uppercase;
      border-bottom: 2px solid #ffd800;
      text-align: left;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #000;
      color: #fff;
      table-layout: fixed;
    }

    th, td {
      padding: 4px 6px;
      border-bottom: 1px solid #222;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background-color: #111;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ccc;
    }

    tr:nth-child(even) td {
      background-color: #050505;
    }

    .time-cell {
      font-family: "Courier New", monospace;
    }

    .callsign-cell {
      font-family: "Courier New", monospace;
      font-weight: bold;
    }

    /* airline column: taller cell, logo fills the block */
    #arrivalsBody tr td:first-child,
    #departuresBody tr td:first-child {
      height: 42px;          /* overall block height */
      padding-top: 0;
      padding-bottom: 0;
    }

    .airline-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .airline-logo {
      height: 32px;          /* a bit smaller than 42px cell */
      width: auto;
      max-width: 90%;
      object-fit: contain;
      display: block;
      background: transparent;
    }

    .status-cell {
      text-transform: uppercase;
      font-weight: bold;
    }
    .status-scheduled { color: #ffffff; }
    .status-gate-open { color: #87cefa; }
    .status-boarding { color: #6cf86c; }
    .status-final { color: #f6f66c; }
    .status-closing { color: #ff9933; }
    .status-departed,
    .status-arrived,
    .status-cancelled { color: #ff6666; }

    .meta {
      margin-top: 6px;
      font-size: 11px;
      color: #aaa;
    }

    @media (max-width: 900px) {
      .board-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1>
    <span class="icon">✈</span>
    <span id="airportTitle">EGKK</span> flights
  </h1>

  <div id="airportInputContainer">
    Airport ICAO:
    <input type="text" id="airportInput" placeholder="EGKK" maxlength="4" />
    <button id="updateBtn">Update</button>
  </div>

  <div class="board-container">
    <!-- Arrivals column -->
    <div class="board-column">
      <div class="board-header">Arrivals</div>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Time</th>
            <th>From</th>
            <th>Flight</th>
            <th>Status</th>
            <th>Gate</th>
          </tr>
        </thead>
        <tbody id="arrivalsBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Departures column -->
    <div class="board-column">
      <div class="board-header">Departures</div>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Time</th>
            <th>To</th>
            <th>Flight</th>
            <th>Status</th>
            <th>Gate</th>
          </tr>
        </thead>
        <tbody id="departuresBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="meta" id="meta">Updating...</div>

<script>
  let airport = 'EGKK';

  const airportTitle = document.getElementById('airportTitle');
  const airportInput = document.getElementById('airportInput');
  const updateBtn = document.getElementById('updateBtn');
  const arrivalsBody = document.getElementById('arrivalsBody');
  const departuresBody = document.getElementById('departuresBody');
  const meta = document.getElementById('meta');

  async function getToken() {
    const res = await fetch('https://ivao-token-server.onrender.com/token');
    if (!res.ok) throw new Error('Token server error: ' + res.status);
    const data = await res.json();
    if (!data.token) throw new Error('No token in response');
    return data.token;
  }

  function secondsToTime(sec) {
    if (sec === null || sec === undefined || sec < 0) return 'N/A';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  }

  function getEtaSeconds(pilot) {
    const lastTrack = pilot.lastTrack;
    if (!lastTrack || lastTrack.arrivalDistance === undefined || lastTrack.groundSpeed <= 0) {
      return null;
    }
    return Math.round((lastTrack.arrivalDistance / lastTrack.groundSpeed) * 3600);
  }

  function getEtaFormatted(pilot) {
    return secondsToTime(getEtaSeconds(pilot));
  }

  function getAirlineCode(callsign) {
    if (!callsign || callsign.length < 3) return null;
    return callsign.substring(0, 3).toUpperCase();
  }

  function getLogoImg(callsign) {
    const icao = getAirlineCode(callsign);
    if (!icao) return '';
    const src = 'logos/' + icao + '.png';   // relative to ivao-board/index.html
    return `<img class="airline-logo" src="${src}" alt="${icao}"
              onerror="this.style.display='none';" />`;
  }

  // fake gate from last 2 digits of flight number so column looks populated
  function getGateFromCallsign(callsign) {
    if (!callsign) return '';
    const digits = callsign.match(/\d+/g);
    if (!digits) return '';
    const d = digits.join('');
    const n = parseInt(d.slice(-2), 10);
    if (Number.isNaN(n)) return '';
    if (n < 40) return (n + 10).toString(); // 10–49 etc
    return n.toString();
  }

  // ARRIVAL STATUS + wording
  function arrStatusAndGateText(pilot) {
    const eta = getEtaSeconds(pilot);
    if (eta == null) {
      return { status: 'En route', statusClass: 'status-scheduled', gateText: '' };
    }
    if (eta < 300) {
      return {
        status: 'Arrived',
        statusClass: 'status-arrived',
        gateText: getGateFromCallsign(pilot.callsign)
      };
    }
    if (eta < 900) {
      return {
        status: 'Landing',
        statusClass: 'status-final',
        gateText: getGateFromCallsign(pilot.callsign)
      };
    }
    if (eta < 1800) {
      return { status: 'Final approach', statusClass: 'status-final', gateText: '' };
    }
    return { status: 'En route', statusClass: 'status-scheduled', gateText: '' };
  }

  // DEPARTURE STATUS + wording (Gatwick-style)
  function depStatusAndGateText(sec, callsign) {
    if (!sec && sec !== 0) {
      return { status: '', statusClass: 'status-scheduled', gateText: '' };
    }
    const now = new Date();
    const nowSec = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60;
    const diff = sec - nowSec;

    if (diff < -900) {
      return { status: 'Departed', statusClass: 'status-departed', gateText: '' };
    }
    if (diff < 0) {
      return {
        status: 'Gate closed',
        statusClass: 'status-closing',
        gateText: getGateFromCallsign(callsign)
      };
    }
    if (diff < 900) {
      return {
        status: 'Boarding',
        statusClass: 'status-boarding',
        gateText: getGateFromCallsign(callsign)
      };
    }
    if (diff < 1800) {
      return {
        status: 'Gate open',
        statusClass: 'status-gate-open',
        gateText: getGateFromCallsign(callsign)
      };
    }

    const infoTimeSec = sec - 1800; // 30 min before scheduled
    const infoStr = secondsToTime(infoTimeSec);
    return {
      status: `Gate info at ${infoStr}`,
      statusClass: 'status-scheduled',
      gateText: ''
    };
  }

  async function fetchFlights(token) {
    const url = 'https://api.ivao.aero/v2/tracker/whazzup';
    const res = await fetch(url, {
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json'
      }
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('IVAO API error:', res.status, errText);
      throw new Error('Failed to fetch IVAO flight data');
    }

    const data = await res.json();
    if (!data.clients || !data.clients.pilots) {
      throw new Error('API response missing "clients.pilots" array');
    }

    const pilots = data.clients.pilots;

    const arrivals = pilots.filter(f => {
      if (!f.flightPlan) return false;
      return f.flightPlan.arrivalId &&
             f.flightPlan.arrivalId.toUpperCase() === airport;
    });

    const departures = pilots.filter(f => {
      if (!f.flightPlan) return false;
      return f.flightPlan.departureId &&
             f.flightPlan.departureId.toUpperCase() === airport;
    });

    arrivals.sort((a, b) => {
      const timeA = getEtaSeconds(a) || 999999;
      const timeB = getEtaSeconds(b) || 999999;
      return timeA - timeB;
    });

    departures.sort((a, b) => {
      const timeA = a.flightPlan.departureTime || 999999;
      const timeB = b.flightPlan.departureTime || 999999;
      return timeA - timeB;
    });

    const arrivalRows = (arrivals.slice(0, 20).map(f => {
      const fromAirport = f.flightPlan.departureId || 'N/A';
      const sched = getEtaFormatted(f);
      const { status, statusClass, gateText } = arrStatusAndGateText(f);
      const logo = getLogoImg(f.callsign);
      const gate = gateText || getGateFromCallsign(f.callsign);

      return `
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${sched}</td>
          <td>${fromAirport}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td class="status-cell ${statusClass}">${status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    }).join('')) || '<tr><td colspan="6">No arrivals</td></tr>';

    const departureRows = (departures.slice(0, 20).map(f => {
      const toAirport = f.flightPlan.arrivalId || 'N/A';
      const sched = secondsToTime(f.flightPlan.departureTime);
      const { status, statusClass, gateText } =
        depStatusAndGateText(f.flightPlan.departureTime, f.callsign);
      const logo = getLogoImg(f.callsign);
      const gate = gateText || getGateFromCallsign(f.callsign);

      return `
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${sched}</td>
          <td>${toAirport}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td class="status-cell ${statusClass}">${status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    }).join('')) || '<tr><td colspan="6">No departures</td></tr>';

    arrivalsBody.innerHTML = arrivalRows;
    departuresBody.innerHTML = departureRows;

    const now = new Date();
    meta.textContent = `Last update: ${now.toUTCString()} – ${airport}`;
  }

  async function update() {
    try {
      meta.textContent = 'Updating...';
      const token = await getToken();
      await fetchFlights(token);
    } catch (e) {
      console.error('Flight fetch error:', e);
      arrivalsBody.innerHTML = '<tr><td colspan="6">Error loading flights</td></tr>';
      departuresBody.innerHTML = '<tr><td colspan="6">Error loading flights</td></tr>';
      meta.textContent = 'Error getting data';
    }
  }

  function setAirport(newAirport) {
    if (!newAirport || newAirport.length !== 4) {
      alert('Please enter a valid 4-letter ICAO code');
      return;
    }
    airport = newAirport.toUpperCase();
    airportTitle.textContent = airport;
    update();
  }

  updateBtn.addEventListener('click', () => {
    setAirport(airportInput.value.trim());
  });

  airportInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      setAirport(airportInput.value.trim());
    }
  });

  update();
  setInterval(update, 15000);
</script>
</body>
</html>

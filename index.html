<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IVAO Flight Board</title>
  <style>
    /* Self‑hosted Istok Web */
    @font-face {
      font-family: 'Istok Web';
      src: url('fonts/IstokWeb-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Istok Web';
      src: url('fonts/IstokWeb-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body {
      font-family: 'Istok Web', sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: left;
      margin: 0 0 10px;
      font-size: 26px;
      color: #f6ee82;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      border: 2px solid #f6ee82;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #airportInputContainer {
      margin-bottom: 10px;
      font-size: 14px;
      color: #ccc;
    }

    #airportInput {
      padding: 4px 8px;
      font-size: 14px;
      width: 90px;
      text-transform: uppercase;
      border-radius: 3px;
      border: 1px solid #666;
      outline: none;
      color: #000;
      font-family: 'Istok Web', sans-serif;
    }

    #updateBtn {
      padding: 4px 10px;
      font-size: 14px;
      margin-left: 6px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      background: #333;
      color: #fff;
      font-family: 'Istok Web', sans-serif;
    }

    #updateBtn:hover {
      background: #555;
    }

    /* Simple inline network toggle */
    #networkToggle {
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }
    #networkToggle button {
      padding: 2px 8px;
      margin-right: 4px;
      font-size: 13px;
      font-family: 'Istok Web', sans-serif;
      border-radius: 3px;
      border: 1px solid #666;
      background: #222;
      color: #ccc;
      cursor: pointer;
    }
    #networkToggle button:hover {
      background: #444;
    }

    .board-container {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
    }

    .board-column {
      flex: 1;
      background: #000;
      border: 1px solid #333;
    }

    .board-header {
      background: #111;
      color: #f6ee82;
      padding: 6px 10px;
      font-size: 18px;
      text-transform: uppercase;
      border-bottom: 2px solid #f6ee82;
      text-align: left;
      font-family: 'Istok Web', sans-serif;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #000;
      color: #fff;
      table-layout: fixed;
      font-family: 'Istok Web', sans-serif;
    }

    th, td {
      padding: 4px 6px;
      border-bottom: 1px solid #222;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background-color: #111;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ccc;
    }

    tr:nth-child(even) td {
      background-color: #050505;
    }

    .time-cell {
      font-family: 'Istok Web', sans-serif;
    }

    .callsign-cell {
      font-family: 'Istok Web', sans-serif;
      font-weight: 700;
      color: #f6ee82;
    }

    /* airline column: taller cell, logo fills the block */
    #arrivalsBody tr td:first-child,
    #departuresBody tr td:first-child {
      height: 42px;
      padding-top: 0;
      padding-bottom: 0;
    }

    .airline-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .airline-logo {
      height: 32px;
      width: auto;
      max-width: 90%;
      object-fit: contain;
      display: block;
      background: transparent;
    }

    .status-cell {
      text-transform: uppercase;
      font-weight: 700;
    }
    .status-scheduled { color: #ffffff; }
    .status-gate-open { color: #6cf86c; }
    .status-boarding { color: #6cf86c; }
    .status-final { color: #f6f66c; }
    .status-closing { color: #ff9933; }
    .status-departed { color: #ffffff; }
    .status-arrived { color: #ffffff; }
    .status-cancelled { color: #ff6666; }
    .status-delayed { color: #ff6666; }

    /* Gate column colour */
    #arrivalsBody tr td:last-child,
    #departuresBody tr td:last-child {
      color: #f6ee82;
      font-weight: 700;
    }

    .meta {
      margin-top: 6px;
      font-size: 11px;
      color: #aaa;
      font-family: 'Istok Web', sans-serif;
    }

    @media (max-width: 900px) {
      .board-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- Network toggle (IVAO / VATSIM) -->
  <div id="networkToggle">
    Network:
    <button id="btnIvao" type="button">IVAO</button>
    <button id="btnVatsim" type="button">VATSIM</button>
  </div>

  <h1>
    <span class="icon">✈</span>
    <span id="airportTitle">EGKK</span> flights
  </h1>

  <div id="airportInputContainer">
    Airport ICAO:
    <input type="text" id="airportInput" placeholder="EGKK" maxlength="4" />
    <button id="updateBtn">Update</button>
  </div>

  <div class="board-container">
    <!-- Arrivals column -->
    <div class="board-column">
      <div class="board-header">Arrivals</div>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Time</th>
            <th>Flight</th>
            <th>From</th>
            <th>Status</th>
            <th>Gate</th>
          </tr>
        </thead>
        <tbody id="arrivalsBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Departures column -->
    <div class="board-column">
      <div class="board-header">Departures</div>
      <table>
        <thead>
          <tr>
            <th>Airline</th>
            <th>Time</th>
            <th>Flight</th>
            <th>To</th>
            <th>Status</th>
            <th>Gate</th>
          </tr>
        </thead>
        <tbody id="departuresBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="meta" id="meta">Updating...</div>

<script>
  let airport = 'EGKK';
  let network = 'ivao'; // 'ivao' or 'vatsim'

  const ROWS_PER_PAGE = 8;
  let arrivalsRowsCache = [];
  let departuresRowsCache = [];
  let currentPageIndex = 0;   // shared for both sides
  let pagingTimer = null;

  const airportTitle   = document.getElementById('airportTitle');
  const airportInput   = document.getElementById('airportInput');
  const updateBtn      = document.getElementById('updateBtn');
  const arrivalsBody   = document.getElementById('arrivalsBody');
  const departuresBody = document.getElementById('departuresBody');
  const meta           = document.getElementById('meta');
  const btnIvao        = document.getElementById('btnIvao');
  const btnVatsim      = document.getElementById('btnVatsim');

  btnIvao.addEventListener('click', () => { network = 'ivao'; update(); });
  btnVatsim.addEventListener('click', () => { network = 'vatsim'; update(); });

  async function getToken() {
    const res = await fetch('https://ivao-token-server.onrender.com/token');
    if (!res.ok) throw new Error('Token server error: ' + res.status);
    const data = await res.json();
    if (!data.token) throw new Error('No token in response');
    return data.token;
  }

  function secondsToTime(sec) {
    if (sec === null || sec === undefined || sec < 0) return 'N/A';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  }

  // ETA in seconds FROM NOW (used for ordering/status)
  function getEtaSeconds(pilot) {
    const lastTrack = pilot.lastTrack;
    if (!lastTrack || lastTrack.arrivalDistance === undefined || lastTrack.groundSpeed <= 0) {
      return null;
    }
    return Math.round((lastTrack.arrivalDistance / lastTrack.groundSpeed) * 3600);
  }

  // Estimated arrival CLOCK time in UTC, using ETA seconds
  function getEtaClockTime(pilot) {
    const etaSec = getEtaSeconds(pilot);
    if (etaSec === null) return 'N/A';
    const now = new Date();
    const etaDate = new Date(now.getTime() + etaSec * 1000);
    const hh = etaDate.getUTCHours().toString().padStart(2, '0');
    const mm = etaDate.getUTCMinutes().toString().padStart(2, '0');
    return `${hh}:${mm}`;
  }

  function getAirlineCode(callsign) {
    if (!callsign || callsign.length < 3) return null;
    return callsign.substring(0, 3).toUpperCase();
  }

  function getLogoImg(callsign) {
    const icao = getAirlineCode(callsign);
    if (!icao) return '';
    const src = 'logos/' + icao + '.png';
    return `<img class="airline-logo" src="${src}" alt="${icao}"
              onerror="this.style.display='none';" />`;
  }

  function isOnGround(f) {
    return !!(f.lastTrack && f.lastTrack.onGround);
  }

  function getGateFromCallsign(callsign) {
    if (!callsign) return '';
    const digits = callsign.match(/\d+/g);
    if (!digits) return '';
    const d = digits.join('');
    const n = parseInt(d.slice(-2), 10);
    if (Number.isNaN(n)) return '';
    if (n < 40) return (n + 10).toString();
    return n.toString();
  }

  // ARRIVAL STATUS + wording (still based on ETA seconds)
  function arrStatusAndGateText(pilot) {
    const eta = getEtaSeconds(pilot);
    if (eta == null) {
      return { status: 'En route', statusClass: 'status-scheduled', gateText: '' };
    }
    if (eta < 30) {
      return {
        status: 'Arrived',
        statusClass: 'status-arrived',
        gateText: getGateFromCallsign(pilot.callsign)
      };
    }
    if (eta < 90) {
      return {
        status: 'Landing',
        statusClass: 'status-final',
        gateText: getGateFromCallsign(pilot.callsign)
      };
    }
    if (eta < 180) {
      return { status: 'Final approach', statusClass: 'status-final', gateText: '' };
    }
    return { status: 'En route', statusClass: 'status-scheduled', gateText: '' };
  }

  // DEPARTURE STATUS + wording (with DELAYED + est time)
  function depStatusAndGateText(sec, callsign, onGround) {
    if (!sec && sec !== 0) {
      return { status: '', statusClass: 'status-scheduled', gateText: '', displayTime: 'N/A' };
    }
    const now = new Date();
    const nowSec = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60;
    const diff = sec - nowSec;

    const schedTime = secondsToTime(sec);
    let status = '';
    let statusClass = 'status-scheduled';
    let gateText = '';

    // still on ground after sched → delayed, show est time only in status
    if (onGround && diff < 0) {
      const delayMinutes = Math.ceil(Math.abs(diff) / 600) * 10;
      const newEstSec = sec + delayMinutes * 60;
      const estStr = secondsToTime(newEstSec);
      return {
        status: `Delayed ${estStr}`,
        statusClass: 'status-delayed',
        gateText: getGateFromCallsign(callsign),
        displayTime: schedTime
      };
    }

    // already gone: keep on board up to 10 minutes after sched, then drop
    if (!onGround && diff < -600) {
      return {
        status: 'HIDE',
        statusClass: 'status-departed',
        gateText: '',
        displayTime: schedTime
      };
    }

    if (diff < -90) {
      status = 'Departed';
      statusClass = 'status-departed';
    } else if (diff < 0) {
      status = 'Gate closed';
      statusClass = 'status-closing';
      gateText = getGateFromCallsign(callsign);
    } else if (diff < 900) {
      status = 'Boarding';
      statusClass = 'status-boarding';
      gateText = getGateFromCallsign(callsign);
    } else if (diff < 1800) {
      status = 'Gate open';
      statusClass = 'status-gate-open';
      gateText = getGateFromCallsign(callsign);
    } else {
      const infoTimeSec = sec - 1800;
      const infoStr = secondsToTime(infoTimeSec);
      status = `Gate info at ${infoStr}`;
      statusClass = 'status-scheduled';
    }

    return { status, statusClass, gateText, displayTime: schedTime };
  }

  // ---------- Paging helpers (shared page index) ----------

  function renderArrivalsPage(pageIndex) {
    if (!arrivalsRowsCache || arrivalsRowsCache.length === 0) {
      arrivalsBody.innerHTML = '<tr><td colspan="6">No arrivals</td></tr>';
      return;
    }
    const start = pageIndex * ROWS_PER_PAGE;
    const rows = arrivalsRowsCache.slice(start, start + ROWS_PER_PAGE).join('');
    arrivalsBody.innerHTML = rows || '<tr><td colspan="6">No arrivals</td></tr>';
  }

  function renderDeparturesPage(pageIndex) {
    if (!departuresRowsCache || departuresRowsCache.length === 0) {
      departuresBody.innerHTML = '<tr><td colspan="6">No departures</td></tr>';
      return;
    }
    const start = pageIndex * ROWS_PER_PAGE;
    const rows = departuresRowsCache.slice(start, start + ROWS_PER_PAGE).join('');
    departuresBody.innerHTML = rows || '<tr><td colspan="6">No departures</td></tr>';
  }

  function restartPagingTimer() {
    if (pagingTimer) clearInterval(pagingTimer);
    pagingTimer = setInterval(() => {
      const maxArrPages = Math.max(1, Math.ceil(arrivalsRowsCache.length / ROWS_PER_PAGE));
      const maxDepPages = Math.max(1, Math.ceil(departuresRowsCache.length / ROWS_PER_PAGE));
      const maxPages = Math.max(maxArrPages, maxDepPages);

      currentPageIndex = (currentPageIndex + 1) % maxPages;

      renderArrivalsPage(currentPageIndex);
      renderDeparturesPage(currentPageIndex);
    }, 10000); // 10 seconds
  }

  function renderCurrentPage() {
    renderArrivalsPage(currentPageIndex);
    renderDeparturesPage(currentPageIndex);
    restartPagingTimer();
  }

  // ---------- IVAO ----------

  async function fetchIvao(token) {
    const url = 'https://api.ivao.aero/v2/tracker/whazzup';
    const res = await fetch(url, {
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json'
      }
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('IVAO API error:', res.status, errText);
      throw new Error('Failed to fetch IVAO flight data');
    }

    const data = await res.json();
    if (!data.clients || !data.clients.pilots) {
      throw new Error('API response missing "clients.pilots" array');
    }

    const pilots = data.clients.pilots;

    const arrivals = pilots.filter(f => {
      if (!f.flightPlan) return false;
      return f.flightPlan.arrivalId &&
             f.flightPlan.arrivalId.toUpperCase() === airport;
    });

    let departures = pilots.filter(f => {
      if (!f.flightPlan) return false;
      return f.flightPlan.departureId &&
             f.flightPlan.departureId.toUpperCase() === airport;
    });

    arrivals.sort((a, b) => {
      const timeA = getEtaSeconds(a) || 999999;
      const timeB = getEtaSeconds(b) || 999999;
      return timeA - timeB;
    });

    departures.sort((a, b) => {
      const timeA = a.flightPlan.departureTime || 999999;
      const timeB = b.flightPlan.departureTime || 999999;
      return timeA - timeB;
    });

    arrivalsRowsCache = arrivals.map(f => {
      const fromAirport = f.flightPlan.departureId || 'N/A';
      const etaClock = getEtaClockTime(f);  // EST ARRIVAL UTC
      const { status, statusClass, gateText } = arrStatusAndGateText(f);
      const logo = getLogoImg(f.callsign);
      const gate = gateText || getGateFromCallsign(f.callsign);

      return `
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${etaClock}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td>${fromAirport}</td>
          <td class="status-cell ${statusClass}">${status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    });

    const depRowsArray = [];
    departures.forEach(f => {
      const toAirport = f.flightPlan.arrivalId || 'N/A';
      const schedSec = f.flightPlan.departureTime;
      const onGround = isOnGround(f);
      const info = depStatusAndGateText(schedSec, f.callsign, onGround);

      if (info.status === 'HIDE') return;

      const logo = getLogoImg(f.callsign);
      const gate = info.gateText || getGateFromCallsign(f.callsign);

      depRowsArray.push(`
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${info.displayTime}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td>${toAirport}</td>
          <td class="status-cell ${info.statusClass}">${info.status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    });

    departuresRowsCache = depRowsArray;
    currentPageIndex = 0;
    renderCurrentPage();

    const now = new Date();
    meta.textContent = `Last update: ${now.toUTCString()} – ${airport} (IVAO)`;
  }

  // ---------- VATSIM ----------

  function vatsimDepSec(deptime) {
    if (!deptime) return null;
    const s = String(deptime).padStart(4, '0');
    const hh = parseInt(s.slice(0, 2), 10);
    const mm = parseInt(s.slice(2, 4), 10);
    return hh * 3600 + mm * 60;
  }

  function vatsimEtaSec(f) {
    if (!f.flight_plan || f.groundspeed < 10) return null;
    if (f.altitude < 1500 && f.groundspeed > 50) return 300;
    return null;
  }

  function vatsimEtaClock(f) {
    const sec = vatsimEtaSec(f);
    if (sec == null) return 'En route';
    const d = new Date(Date.now() + sec * 1000);
    const hh = d.getUTCHours().toString().padStart(2, '0');
    const mm = d.getUTCMinutes().toString().padStart(2, '0');
    return `${hh}:${mm}`;
  }

  function vatsimArrStatus(f) {
    const onGround = f.groundspeed < 30;
    const eta = vatsimEtaSec(f);
    if (onGround)             return { status: 'Arrived',        statusClass: 'status-arrived',   gateText: getGateFromCallsign(f.callsign) };
    if (eta != null && eta < 90)  return { status: 'Landing',        statusClass: 'status-final',     gateText: getGateFromCallsign(f.callsign) };
    if (eta != null && eta < 180) return { status: 'Final approach', statusClass: 'status-final',     gateText: '' };
    return { status: 'En route', statusClass: 'status-scheduled', gateText: '' };
  }

  async function fetchVatsim() {
    const res = await fetch('https://data.vatsim.net/v3/vatsim-data.json');
    if (!res.ok) {
      throw new Error('VATSIM API error: ' + res.status);
    }
    const data = await res.json();
    const pilots = data.pilots || [];

    const arrivals = pilots
      .filter(f => f.flight_plan && f.flight_plan.arrival && f.flight_plan.arrival.toUpperCase() === airport)
      .sort((a, b) => (vatsimEtaSec(a) || 999999) - (vatsimEtaSec(b) || 999999));

    const departures = pilots
      .filter(f => f.flight_plan && f.flight_plan.departure && f.flight_plan.departure.toUpperCase() === airport)
      .sort((a, b) => (vatsimDepSec(a.flight_plan.deptime) || 999999) - (vatsimDepSec(b.flight_plan.deptime) || 999999));

    arrivalsRowsCache = arrivals.map(f => {
      const fromAirport = f.flight_plan.departure || 'N/A';
      const etaClock = vatsimEtaClock(f);
      const { status, statusClass, gateText } = vatsimArrStatus(f);
      const logo = getLogoImg(f.callsign);
      const gate = gateText || getGateFromCallsign(f.callsign);

      return `
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${etaClock}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td>${fromAirport}</td>
          <td class="status-cell ${statusClass}">${status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    });

    const depRowsArray = [];
    departures.forEach(f => {
      const toAirport = f.flight_plan.arrival || 'N/A';
      const schedSec = vatsimDepSec(f.flight_plan.deptime);
      const onGround = f.groundspeed < 30;
      const info = depStatusAndGateText(schedSec, f.callsign, onGround);
      if (info.status === 'HIDE') return;

      const logo = getLogoImg(f.callsign);
      const gate = info.gateText || getGateFromCallsign(f.callsign);

      depRowsArray.push(`
        <tr>
          <td class="airline-cell">${logo}</td>
          <td class="time-cell">${info.displayTime}</td>
          <td class="callsign-cell">${f.callsign}</td>
          <td>${toAirport}</td>
          <td class="status-cell ${info.statusClass}">${info.status}</td>
          <td>${gate || ''}</td>
        </tr>
      `;
    });

    departuresRowsCache = depRowsArray;
    currentPageIndex = 0;
    renderCurrentPage();

    const now = new Date();
    meta.textContent = `Last update: ${now.toUTCString()} – ${airport} (VATSIM)`;
  }

  // ---------- Main update ----------

  async function update() {
    try {
      meta.textContent = 'Updating...';
      arrivalsBody.innerHTML   = '<tr><td colspan="6">Loading...</td></tr>';
      departuresBody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

      if (network === 'ivao') {
        const token = await getToken();
        await fetchIvao(token);
      } else {
        await fetchVatsim();
      }
    } catch (e) {
      console.error('Flight fetch error:', e);
      arrivalsBody.innerHTML = '<tr><td colspan="6">Error loading flights</td></tr>';
      departuresBody.innerHTML = '<tr><td colspan="6">Error loading flights</td></tr>';
      meta.textContent = 'Error getting data';
    }
  }

  function setAirport(newAirport) {
    if (!newAirport || newAirport.length !== 4) {
      alert('Please enter a valid 4-letter ICAO code');
      return;
    }
    airport = newAirport.toUpperCase();
    airportTitle.textContent = airport;
    update();
  }

  updateBtn.addEventListener('click', () => {
    setAirport(airportInput.value.trim());
  });

  airportInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      setAirport(airportInput.value.trim());
    }
  });

  update();
  setInterval(update, 15000);
</script>
</body>
</html>

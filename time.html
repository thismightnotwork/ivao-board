<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live ICAO Time (OBS)</title>
  <style>
    body {
      font-family: monospace;
      margin: 0.5rem;
      background-color: black;
      color: white;
    }
    label, input, button {
      display: block;
      margin: 0.2rem 0;
    }
    input, button {
      background-color: #111;
      color: white;
      border: 1px solid #555;
      padding: 0.4rem;
    }
    button {
      margin-top: 0.5rem;
    }
    .result {
      margin-top: 0.8rem;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <label for="icao">ICAO:</label>
  <input type="text" id="icao" placeholder="EGLL" />
  <button onclick="setIcao()">Set airport</button>

  <div id="result" class="result"></div>

  <script>
    // ICAO → IANA timezone mapping (you can expand this)
    const icaoToTz = {
      "EGLL": "Europe/London",
      "EGKK": "Europe/London",
      "EGCC": "Europe/London",
      "EGLC": "Europe/London",
      "EGNX": "Europe/London",
      "EGBB": "Europe/London",
      "EGPH": "Europe/London",
      "EGPF": "Europe/London",
      "EDDM": "Europe/Berlin",
      "EDDF": "Europe/Berlin",
      "EDDH": "Europe/Berlin",
      "EDDT": "Europe/Berlin",
      "KJFK": "America/New_York",
      "KLAX": "America/Los_Angeles",
      "KORD": "America/Chicago",
      "KSFO": "America/Los_Angeles",
      "LFPG": "Europe/Paris",
      "LFBO": "Europe/Paris",
      "LSGG": "Europe/Zurich",
      "LIMC": "Europe/Rome",
      "LPPT": "Europe/Lisbon",
      "EHAM": "Europe/Amsterdam",
      "LOWI": "Europe/Vienna"
    };

    // Use a CORS‑enabled, no‑key time API (time.now)
    // Docs: https://time.now/developer
    const TIME_NOW_API = "https://time.now/developer/api/timezone/";

    let tz = "UTC";
    let clockInterval = null;

    async function setIcao() {
      const icao = document.getElementById("icao").value.trim().toUpperCase();
      if (!icao) return alert("Please enter an ICAO code (e.g. EGLL).");

      document.getElementById("result").innerHTML = "Loading…";

      if (clockInterval) clearInterval(clockInterval);

      tz = icaoToTz[icao] || "UTC"; // fallback to UTC if unknown

      // If you want to validate/fetch from free time.now later, tweak this
      // For now, just render using tz immediately
      renderClock();
    }

    // Use time.now API to get real‑time local time (with seconds)
    async function fetchLocalTime(tz) {
      try {
        const res = await fetch(TIME_NOW_API + encodeURIComponent(tz));
        const data = await res.json();
        if (data.datetime) {
          // Parse ISO datetime to local‑formatted string
          const dt = new Date(data.datetime);
          return dt.toISOString().slice(0, 19).replace("T", " ");
        }
      } catch (err) {
        console.warn("Using fallback for", tz);
      }
      return null;
    }

    function formatTime(date, timeZone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(date);
    }

    function formatUtcOffset(date, timeZone) {
      const str = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        timeZoneName: "shortOffset"
      }).formatRange(date, date);
      return str.replace(/^.*\s/, "");
    }

    function renderClock() {
      const nowLocal = new Date();
      const nowUtc = new Date(nowLocal.getTime() + nowLocal.getTimezoneOffset() * 60000);

      const icao = document.getElementById("icao").value.trim().toUpperCase();
      const labelTz = tz !== "UTC" ? tz.split("/").pop().replace(/_/g, " ") : "UTC";

      const loc = tz === "UTC"
        ? formatTime(nowUtc, "UTC")
        : formatTime(nowLocal, tz);
      const utc = formatTime(nowUtc, "UTC");
      const offset = tz === "UTC" ? "UTC+0" : formatUtcOffset(nowLocal, tz);

      document.getElementById("result").innerHTML = `
        <div><b>Local:</b> ${loc}</div>
        <div><b>UTC:</b> ${utc}</div>
        <div class="small">${icao} · ${labelTz} · ${offset}</div>
      `;

      clockInterval = setInterval(renderClock, 1000);
    }
  </script>
</body>
</html>

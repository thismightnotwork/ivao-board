<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XU ATS Feedback Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1725;
      color: #f5f7fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      margin: 32px 16px;
      padding: 24px 20px;
      max-width: 480px;
      background: #131f33;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.04);
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 4px 0;
    }
    h2 {
      font-size: 1.15rem;
      margin: 16px 0 8px 0;
    }
    p {
      margin: 4px 0 8px 0;
      font-size: 0.9rem;
      color: #c3ccdd;
    }
    label {
      display: block;
      margin: 10px 0 4px 0;
      font-size: 0.85rem;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #31415f;
      background: #0b1725;
      color: #f5f7fa;
      font-size: 0.9rem;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.6);
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: #3b82f6;
      color: #f5f7fa;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.5);
    }
    button:hover {
      background: #2563eb;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(37, 99, 235, 0.6);
    }
    .secondary {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #3b82f6;
      box-shadow: none;
    }
    .secondary:hover {
      background: rgba(59,130,246,0.08);
    }
    .small {
      font-size: 0.8rem;
      color: #9ca3b7;
      margin-top: 4px;
    }
    .cid-display {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #9ca3b7;
    }
    .error {
      color: #f97373;
      font-size: 0.8rem;
      margin-top: 6px;
    }
    .success-link {
      word-break: break-all;
      font-size: 0.8rem;
      margin-top: 8px;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>XU ATS Feedback Helper</h1>
    <p>Stores your CID once, then builds the retrospective feedback URL for any date and position.</p>

    <!-- CID setup -->
    <h2>Your CID</h2>
    <p class="small">This is stored locally in your browser only.</p>
    <label for="cidInput">IVAO CID</label>
    <input id="cidInput" type="number" inputmode="numeric" placeholder="e.g. 12345678">
    <button id="saveCidBtn">Save CID</button>
    <div id="cidDisplay" class="cid-display"></div>

    <!-- Session details -->
    <h2>Session details</h2>
    <label for="positionInput">Position (callsign)</label>
    <input id="positionInput" type="text" placeholder="e.g. EGXX_XXX">

    <label for="dateInput">Session date</label>
    <input id="dateInput" type="date">

    <button id="buildBtn">Open feedback form</button>
    <button id="copyBtn" class="secondary">Copy link instead</button>
    <div id="error" class="error"></div>
    <div id="linkOutput" class="success-link"></div>
  </div>

  <script>
    // ---- CONFIG: form + field IDs ----

    const BASE_FORM_URL =
      "https://docs.google.com/forms/d/e/1FAIpQLSeE7C3eAIHsezqrNbfynw3Ghts8kzMSHlUJ_fanE_JUjdw4Qw/viewform";

    // Field IDs for prefill (from your existing link)
    // position/callsign: entry.1799182697
    // date: entry.270527378 (YYYY-MM-DD)
    // CID: entry.831438602
    const ENTRY_POSITION = "entry.1799182697";
    const ENTRY_DATE = "entry.270527378";
    const ENTRY_CID = "entry.831438602";

    const CID_STORAGE_KEY = "xu_ats_feedback_cid";

    // ---- Helpers ----

    function loadCid() {
      return localStorage.getItem(CID_STORAGE_KEY) || "";
    }

    function saveCid(cid) {
      localStorage.setItem(CID_STORAGE_KEY, cid);
    }

    function updateCidDisplay() {
      const cid = loadCid();
      const disp = document.getElementById("cidDisplay");
      const cidInput = document.getElementById("cidInput");
      if (cid) {
        disp.textContent = "Stored CID: " + cid;
        cidInput.value = cid;
      } else {
        disp.textContent = "No CID stored yet.";
        cidInput.placeholder = "e.g. 12345678";
      }
    }

    function buildFormUrl({ position, dateStr, cid }) {
      const params = new URLSearchParams();

      if (position) params.set(ENTRY_POSITION, position);
      if (dateStr) params.set(ENTRY_DATE, dateStr);
      if (cid) params.set(ENTRY_CID, cid);

      // Match Google prefill flags from your existing link
      params.set("usp", "pp_url");
      params.set("srd", "true");

      return BASE_FORM_URL + "?" + params.toString();
    }

    function showError(msg) {
      document.getElementById("error").textContent = msg || "";
    }

    function setLinkOutput(url) {
      const out = document.getElementById("linkOutput");
      out.textContent = url ? "Generated link: " + url : "";
    }

    // ---- Event wiring ----

    window.addEventListener("DOMContentLoaded", () => {
      const cidInput = document.getElementById("cidInput");
      const saveCidBtn = document.getElementById("saveCidBtn");
      const buildBtn = document.getElementById("buildBtn");
      const copyBtn = document.getElementById("copyBtn");
      const positionInput = document.getElementById("positionInput");
      const dateInput = document.getElementById("dateInput");

      updateCidDisplay();

      // Defaults: example position and today’s date
      positionInput.value = "EGXX_XXX";
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      dateInput.value = `${yyyy}-${mm}-${dd}`;

      saveCidBtn.addEventListener("click", () => {
        const cidVal = cidInput.value.trim();
        if (!cidVal) {
          showError("Please enter a CID before saving.");
          return;
        }
        saveCid(cidVal);
        updateCidDisplay();
        showError("");
      });

      function generateUrlOrError() {
        const cid = loadCid();
        const position = positionInput.value.trim();
        const dateStr = dateInput.value;

        if (!cid) {
          showError("No stored CID. Please enter and save your CID first.");
          return null;
        }
        if (!dateStr) {
          showError("Please select a session date.");
          return null;
        }
        if (!position) {
          showError("Please enter a position (e.g. EGXX_XXX).");
          return null;
        }

        showError("");
        return buildFormUrl({ position, dateStr, cid });
      }

      buildBtn.addEventListener("click", () => {
        setLinkOutput("");
        const url = generateUrlOrError();
        if (!url) return;
        setLinkOutput(url);
        window.open(url, "_blank");
      });

      copyBtn.addEventListener("click", async () => {
        setLinkOutput("");
        const url = generateUrlOrError();
        if (!url) return;

        try {
          await navigator.clipboard.writeText(url);
          setLinkOutput(url + " (copied to clipboard)");
        } catch (e) {
          setLinkOutput(url + " (failed to copy automatically)");
        }
      });
    });
  </script>
</body>
</html>
